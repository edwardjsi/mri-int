# Render.com Blueprint — MRI Signal Platform
# Deploy: Connect this repo to Render.com and it auto-detects this file.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── FastAPI Backend (Docker) ──────────────────────────────
  - type: web
    name: mri-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually: your Neon.tech connection string
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHONPATH
        value: /app
      - key: CORS_ORIGINS
        sync: false  # Set to your frontend URL, e.g. https://mri-frontend.onrender.com
      - key: SES_SENDER_EMAIL
        value: edwardjsi@gmail.com
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  # ── React Frontend (Static Site) ──────────────────────────
  - type: web
    name: mri-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    region: singapore
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to: https://mri-api.onrender.com/api
