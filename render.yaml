# Render.com Blueprint — MRI Signal Platform
# Deploy: Connect this repo to Render.com and it auto-detects this file.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Unified Platform (Docker) ──────────────────────────────
  - type: web
    name: mri-unified
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false  # Neon.tech connection string
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHONPATH
        value: /app
      - key: SES_SENDER_EMAIL
        value: edwardjsi@gmail.com
      - key: SES_REGION
        value: ap-southeast-1
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: VITE_API_URL
        value: /api
