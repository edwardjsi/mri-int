name: TRUTH V2 (FINAL)

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: FINAL DEPENDENCY INJECTION
        run: |
          pip install yfinance psycopg2-binary pandas
          
      - name: EXECUTE ENGINE_CORE
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: "true"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "==== TRUTH V2 EXECUTING ==== "
          python scripts/mri_pipeline.py
