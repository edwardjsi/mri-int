name: RESCUE MRI Pipeline

on:
  schedule:
    - cron: '30 10 * * 1-5'
  
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run MRI Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: "true"
          PYTHONPATH: ${{ github.workspace }}
          SES_SENDER_EMAIL: "edwardjsi@gmail.com"
          SES_REGION: "ap-southeast-1"
          AWS_REGION: "ap-south-1"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # DIAGNOSTIC: List all files on the runner!
          echo "=== RUNNER DIAGNOSTIC: ROOT CONTENT ==="
          ls -R
          echo "=== RUNNER DIAGNOSTIC: EXECUTING PIPELINE ==="
          python scripts/mri_pipeline.py
