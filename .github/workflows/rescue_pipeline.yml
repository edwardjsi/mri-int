name: NUCLEAR RESCUE

on:
  schedule:
    - cron: '30 10 * * 1-5'
  
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: NUCLEAR TRACER EXECUTION
        run: |
          echo "=== NUCLEAR TRACER EXECUTING... ==="
          python scripts/FINAL_TRUTH.py
