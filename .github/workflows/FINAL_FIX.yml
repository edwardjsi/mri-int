name: FINAL FIX
on:
  workflow_dispatch:
  schedule:
    # 4:00 PM IST / 10:30 AM UTC, Monday–Friday
    - cron: "30 10 * * 1-5"
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: RUN REAL PIPELINE (ENGINE_CORE)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: "true"
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/mri_pipeline.py
